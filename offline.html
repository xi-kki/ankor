<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Ankore - Offline</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          'Inter',
          -apple-system,
          sans-serif;
        background: #0f0f14;
        color: #f5f5f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
      }

      .offline-container {
        text-align: center;
        max-width: 400px;
        padding: 40px 32px;
        background: #18181f;
        border-radius: 32px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
        animation: fadeIn 0.5s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .offline-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        background: linear-gradient(135deg, #2d2d3a 0%, #1a1a24 100%);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      h1 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 12px;
        color: #f5f5f5;
      }

      p {
        color: #a0a0a0;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      .features {
        background: #1f1f2a;
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 24px;
        text-align: left;
      }

      .features h3 {
        font-size: 14px;
        font-weight: 500;
        color: #8b8ba3;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 16px;
      }

      .feature-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .feature-item:last-child {
        border-bottom: none;
      }

      .feature-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #3d3d4a 0%, #2d2d3a 100%);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
      }

      .feature-text {
        font-size: 14px;
        color: #d0d0d0;
      }

      .retry-button {
        width: 100%;
        padding: 16px 32px;
        background: linear-gradient(135deg, #1a1a24 0%, #0f0f14 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        color: #f5f5f5;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        min-height: 52px;
        min-width: 52px;
        font-family: inherit;
      }

      .retry-button:hover {
        background: linear-gradient(135deg, #2a2a34 0%, #1a1a24 100%);
        border-color: rgba(255, 255, 255, 0.15);
      }

      .retry-button:active {
        transform: scale(0.98);
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }

      @media (prefers-color-scheme: light) {
        body {
          background: #f5f5f5;
        }
        .offline-container {
          background: #ffffff;
          box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        .offline-icon {
          background: linear-gradient(135deg, #e8e8f0 0%, #d8d8e0 100%);
        }
        h1 {
          color: #1a1a1a;
        }
        p {
          color: #666;
        }
        .features {
          background: #f8f8fa;
        }
        .feature-icon {
          background: linear-gradient(135deg, #e0e0e8 0%, #d0d0d8 100%);
        }
        .retry-button {
          background: #1a1a1a;
          color: #fff;
        }
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <div class="offline-icon">📡</div>
      <h1>You're Offline</h1>
      <p>Don't worry, you can still use some features of Ankore without an internet connection.</p>

      <div class="features">
        <h3>Available Offline</h3>
        <div class="feature-item">
          <div class="feature-icon">🫁</div>
          <div class="feature-text">Breathing exercises</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">💬</div>
          <div class="feature-text">View past conversations</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🧘</div>
          <div class="feature-text">Quick grounding techniques</div>
        </div>
      </div>

      <button class="retry-button" onclick="retryConnection()">Try Again</button>
    </div>

    <script>
      function retryConnection() {
        if (navigator.onLine) {
          window.location.href = '/';
        } else {
          navigator.serviceWorker.controller?.postMessage('retry');
          setTimeout(() => {
            if (navigator.onLine) {
              window.location.href = '/';
            }
          }, 1000);
        }
      }

      // Auto-retry when online
      window.addEventListener('online', () => {
        window.location.href = '/';
      });

      // Check connection status periodically
      setInterval(() => {
        if (navigator.onLine) {
          window.location.href = '/';
        }
      }, 5000);
    </script>
  </body>
</html>
