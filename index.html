<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankor — Someone's Always Here</title>
    <link rel="stylesheet" href="https://db.onlinewebfonts.com/c/304a6edcec9f8858eeaafc2ac18243f4?family=Askan+Light">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        askan: ['"Askan Light"', 'serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        anchor: {
                            bg: '#0a0a0f',
                            accent: '#7c6aef',
                        }
                    },
                },
            },
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overflow: hidden; }
        .hero-video { object-position: 80% center; }
        @media (min-width: 768px) { .hero-video { object-position: right center; } }
        @media (min-width: 1024px) { .hero-video { object-position: center center; } }
        .landing-page { transition: opacity 0.8s ease, transform 0.8s ease; }
        .landing-page.hidden-state { opacity: 0; transform: scale(1.05); pointer-events: none; }
        .app-page { transition: opacity 0.8s ease, transform 0.8s ease; }
        .app-page.hidden-state { opacity: 0; transform: scale(0.95); pointer-events: none; }
        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(124, 106, 239, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px 20px rgba(124, 106, 239, 0.2); }
        }
        .avatar-breathe { animation: breathe 4s ease-in-out infinite; }
        @keyframes listenPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 0; }
        }
        .listen-pulse { animation: listenPulse 2s ease-in-out infinite; }
        @keyframes audioBar {
            0%, 100% { height: 8px; }
            50% { height: var(--bar-height, 32px); }
        }
        .audio-bar {
            animation: audioBar var(--bar-speed, 0.5s) ease-in-out infinite;
            animation-delay: var(--bar-delay, 0s);
        }
        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }
        .typing-dot { animation: typingDot 1.4s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        .noise-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }
        ::-webkit-scrollbar { display: none; }
        html { scrollbar-width: none; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.8s ease-out forwards; }
        .delay-1 { animation-delay: 0.1s; opacity: 0; }
        .delay-2 { animation-delay: 0.2s; opacity: 0; }
        .delay-3 { animation-delay: 0.3s; opacity: 0; }
        .delay-4 { animation-delay: 0.4s; opacity: 0; }
    </style>
</head>
<body class="bg-anchor-bg text-white">

    <!-- ==================== LANDING PAGE ==================== -->
    <div id="landingPage" class="landing-page fixed inset-0 z-50">
        <video class="hero-video absolute inset-0 w-full h-full object-cover brightness-[0.3]" autoplay loop muted playsinline>
            <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260618_174853_aac61aa2-0f3f-4cf1-bc78-7f657dd11164.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 z-[1] bg-gradient-to-b from-transparent via-transparent to-anchor-bg/90"></div>
        <div class="absolute inset-0 z-[2] noise-overlay opacity-[0.02] pointer-events-none"></div>
        <div class="absolute top-[20%] right-[10%] w-[400px] h-[400px] rounded-full bg-anchor-accent blur-[120px] opacity-15 z-[1] pointer-events-none"></div>

        <div class="relative z-10 h-full flex flex-col px-4 sm:px-10 lg:px-12 py-4 sm:py-8">
            <nav class="flex items-center justify-between fade-in delay-1">
                <div class="bg-black/20 backdrop-blur-md rounded-2xl border border-white/10 px-4 py-2.5 sm:px-6 sm:py-4 flex items-center gap-2">
                    <svg class="w-5 h-5 sm:w-7 sm:h-7 text-white" viewBox="0 0 256 256" fill="currentColor">
                        <path d="M 228 0 C 172.772 0 128 44.772 128 100 L 128 0 L 0 0 L 0 28 C 0 83.228 44.772 128 100 128 L 0 128 L 0 256 L 28 256 C 83.228 256 128 211.228 128 156 L 128 256 L 256 256 L 256 228 C 256 172.772 211.228 128 156 128 L 256 128 L 256 0 Z"/>
                    </svg>
                    <span class="font-askan text-white text-base sm:text-xl tracking-wide">Ankor</span>
                </div>
                <button class="sm:hidden text-white p-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <button class="hidden sm:block bg-white text-gray-900 font-medium text-sm px-6 py-3 rounded-full">Sign In</button>
            </nav>

            <div class="flex-1 sm:hidden"></div>

            <div class="flex flex-col sm:flex-1 sm:flex-row sm:items-end pb-4 sm:pb-12 lg:pb-16 sm:mt-auto">
                <div class="flex-1">
                    <h1 class="font-askan text-white text-[2.5rem] sm:text-[4rem] md:text-[5rem] lg:text-[6rem] leading-[1] tracking-tight max-w-[700px] fade-in delay-2">
                        Talk to someone.<br><span class="text-white/40">Right now.</span>
                    </h1>

                    <p class="text-white/60 text-sm sm:text-lg max-w-[400px] leading-relaxed mt-4 sm:mt-6 fade-in delay-3">
                        When the panic hits at 2 AM. When you can't move. When no one's around.
                        <span class="text-white/90 font-medium">Ankor is.</span>
                    </p>

                    <button onclick="startApp()" class="mt-6 sm:mt-8 group inline-flex items-center gap-3 bg-white text-gray-900 font-medium text-sm sm:text-base px-8 py-4 rounded-full transition-all duration-300 hover:scale-105 hover:shadow-[0_0_40px_rgba(255,255,255,0.3)] fade-in delay-4">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" x2="12" y1="19" y2="22"/>
                        </svg>
                        <span>Start Talking</span>
                    </button>

                    <p class="text-white/25 text-xs mt-3 fade-in delay-4">Free · Private · No signup</p>
                </div>

                <div class="hidden sm:flex flex-col items-end gap-2 self-end">
                    <span class="bg-black/30 backdrop-blur-md text-white/80 text-sm px-4 py-2 rounded-full border border-white/10">🎙️ Voice-first</span>
                    <span class="bg-black/30 backdrop-blur-md text-white/80 text-sm px-4 py-2 rounded-full border border-white/10">🧘 Real-time calm</span>
                    <span class="bg-black/30 backdrop-blur-md text-white/80 text-sm px-4 py-2 rounded-full border border-white/10">🧠 Task breakdown</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== APP PAGE ==================== -->
    <div id="appPage" class="app-page hidden-state fixed inset-0 z-40 bg-anchor-bg flex flex-col items-center justify-center">
        <div class="absolute inset-0 pointer-events-none">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] rounded-full bg-anchor-accent blur-[150px] opacity-10" id="ambientGlow"></div>
        </div>

        <div class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-4 sm:px-8 py-4 sm:py-6">
            <div class="flex items-center gap-2 text-white/40 text-sm">
                <svg class="w-4 h-4" viewBox="0 0 256 256" fill="currentColor">
                    <path d="M 228 0 C 172.772 0 128 44.772 128 100 L 128 0 L 0 0 L 0 28 C 0 83.228 44.772 128 100 128 L 0 128 L 0 256 L 28 256 C 83.228 256 128 211.228 128 156 L 128 256 L 256 256 L 256 228 C 256 172.772 211.228 128 156 128 L 256 128 L 256 0 Z"/>
                </svg>
                <span class="font-askan tracking-wide">Ankor</span>
            </div>
            <button class="text-white/40 hover:text-white/70 transition-colors p-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 16v-4M12 8h.01"/>
                </svg>
            </button>
        </div>

        <div class="relative z-10 flex flex-col items-center justify-center px-6 max-w-lg w-full">
            <div id="avatar" class="relative mb-8">
                <div id="pulseRing1" class="absolute inset-0 rounded-full border border-anchor-accent/30 opacity-0 transition-opacity duration-500"></div>
                <div id="pulseRing2" class="absolute -inset-4 rounded-full border border-anchor-accent/20 opacity-0 transition-opacity duration-500"></div>
                <div id="pulseRing3" class="absolute -inset-8 rounded-full border border-anchor-accent/10 opacity-0 transition-opacity duration-500"></div>
                <div id="avatarCircle" class="w-24 h-24 sm:w-32 sm:h-32 rounded-full bg-gradient-to-br from-anchor-accent/20 to-anchor-accent/5 border border-anchor-accent/30 flex items-center justify-center avatar-breathe cursor-pointer transition-all duration-500" onclick="toggleListening()">
                    <svg id="avatarIcon" class="w-10 h-10 sm:w-14 sm:h-14 text-anchor-accent/80 transition-all duration-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" x2="12" y1="19" y2="22"/>
                    </svg>
                </div>
            </div>

            <p id="statusText" class="text-white/50 text-sm sm:text-base mb-6 text-center transition-all duration-300">Tap to start talking</p>

            <div id="audioBars" class="flex items-end gap-1 h-12 mb-8 opacity-0 transition-opacity duration-300">
                <div class="audio-bar w-1 bg-anchor-accent/60 rounded-full" style="--bar-height: 20px; --bar-speed: 0.4s; --bar-delay: 0s;"></div>
                <div class="audio-bar w-1 bg-anchor-accent/70 rounded-full" style="--bar-height: 32px; --bar-speed: 0.5s; --bar-delay: 0.1s;"></div>
                <div class="audio-bar w-1 bg-anchor-accent/80 rounded-full" style="--bar-height: 24px; --bar-speed: 0.35s; --bar-delay: 0.15s;"></div>
                <div class="audio-bar w-1 bg-anchor-accent rounded-full" style="--bar-height: 40px; --bar-speed: 0.45s; --bar-delay: 0.05s;"></div>
                <div class="audio-bar w-1 bg-anchor-accent/90 rounded-full" style="--bar-height: 28px; --bar-speed: 0.55s; --bar-delay: 0.2s;"></div>
                <div class="audio-bar w-1 bg-anchor-accent/70 rounded-full" style="--bar-height: 36px; --bar-speed: 0.4s; --bar-delay: 0.12s;"></div>
                <div class="audio-bar w-1 bg-anchor-accent/60 rounded-full" style="--bar-height: 18px; --bar-speed: 0.5s; --bar-delay: 0.08s;"></div>
                <div class="audio-bar w-1 bg-anchor-accent/50 rounded-full" style="--bar-height: 26px; --bar-speed: 0.38s; --bar-delay: 0.18s;"></div>
                <div class="audio-bar w-1 bg-anchor-accent/40 rounded-full" style="--bar-height: 16px; --bar-speed: 0.48s; --bar-delay: 0.22s;"></div>
            </div>

            <div id="messageArea" class="w-full min-h-[80px] flex flex-col items-center justify-center">
                <div id="typingIndicator" class="hidden flex items-center gap-2 text-white/40">
                    <div class="typing-dot w-2 h-2 rounded-full bg-anchor-accent/60"></div>
                    <div class="typing-dot w-2 h-2 rounded-full bg-anchor-accent/60"></div>
                    <div class="typing-dot w-2 h-2 rounded-full bg-anchor-accent/60"></div>
                </div>
                <div id="aiResponse" class="hidden text-center">
                    <p id="aiResponseText" class="text-white/80 text-base sm:text-lg leading-relaxed"></p>
                </div>
            </div>

            <div id="quickActions" class="flex flex-wrap justify-center gap-2 mt-8">
                <button onclick="sendQuickAction('I\'m overwhelmed and can\'t think straight')" class="bg-white/5 hover:bg-white/10 border border-white/10 text-white/70 hover:text-white text-xs sm:text-sm px-4 py-2.5 rounded-full transition-all duration-200">
                    😰 I'm overwhelmed
                </button>
                <button onclick="sendQuickAction('I can\'t focus on anything, my mind is racing')" class="bg-white/5 hover:bg-white/10 border border-white/10 text-white/70 hover:text-white text-xs sm:text-sm px-4 py-2.5 rounded-full transition-all duration-200">
                    😤 Can't focus
                </button>
                <button onclick="sendQuickAction('I just need to calm down and breathe')" class="bg-white/5 hover:bg-white/10 border border-white/10 text-white/70 hover:text-white text-xs sm:text-sm px-4 py-2.5 rounded-full transition-all duration-200">
                    🧘 Need to breathe
                </button>
            </div>
        </div>

        <div class="absolute bottom-6 sm:bottom-8 left-0 right-0 text-center">
            <p class="text-white/20 text-xs">AI companion, not a therapist. In crisis? Call 988.</p>
        </div>
    </div>

    <script>
        let isListening = false;
        let ws = null;
        let mediaRecorder = null;
        let audioContext = null;

        function startApp() {
            const landing = document.getElementById('landingPage');
            const app = document.getElementById('appPage');
            landing.classList.add('hidden-state');
            setTimeout(() => {
                app.classList.remove('hidden-state');
                connectWebSocket();
            }, 400);
        }

        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}`);

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === 'listening_started') {
                    document.getElementById('statusText').textContent = 'Listening...';
                    document.getElementById('audioBars').style.opacity = '1';
                } else if (msg.type === 'listening_stopped') {
                    document.getElementById('statusText').textContent = '';
                    document.getElementById('audioBars').style.opacity = '0';
                } else if (msg.type === 'transcript') {
                    console.log('You said:', msg.text);
                } else if (msg.type === 'ai_thinking') {
                    showTyping();
                } else if (msg.type === 'ai_response') {
                    showAIResponse(msg.text);
                    if (msg.audio) {
                        playAudio(msg.audio);
                    }
                }
            };

            ws.onclose = () => {
                setTimeout(connectWebSocket, 3000);
            };
        }

        async function toggleListening() {
            if (isListening) {
                stopListening();
            } else {
                await startListening();
            }
        }

        async function startListening() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(stream);
                const processor = audioContext.createScriptProcessor(4096, 1, 1);

                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = (e) => {
                    if (isListening && ws?.readyState === WebSocket.OPEN) {
                        const inputData = e.inputBuffer.getChannelData(0);
                        const buffer = new Float32Array(inputData);
                        const base64 = btoa(String.fromCharCode.apply(null, new Int16Array(buffer.buffer)));
                        ws.send(JSON.stringify({ type: 'audio_chunk', data: base64 }));
                    }
                };

                mediaRecorder = stream;
                isListening = true;

                if (ws?.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'start_listening' }));
                }

                updateAvatarState(true);
            } catch (err) {
                console.error('Microphone error:', err);
                document.getElementById('statusText').textContent = 'Mic access denied';
            }
        }

        function stopListening() {
            isListening = false;
            if (mediaRecorder) {
                mediaRecorder.getTracks().forEach(track => track.stop());
                mediaRecorder = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            if (ws?.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'stop_listening' }));
            }
            updateAvatarState(false);
        }

        function updateAvatarState(listening) {
            const avatar = document.getElementById('avatarCircle');
            const statusText = document.getElementById('statusText');
            const audioBars = document.getElementById('audioBars');
            const pulseRings = [document.getElementById('pulseRing1'), document.getElementById('pulseRing2'), document.getElementById('pulseRing3')];
            const ambientGlow = document.getElementById('ambientGlow');

            if (listening) {
                avatar.classList.remove('avatar-breathe');
                avatar.style.transform = 'scale(1.1)';
                avatar.style.boxShadow = '0 0 60px 30px rgba(124, 106, 239, 0.3)';
                audioBars.style.opacity = '1';
                pulseRings.forEach((ring, i) => {
                    setTimeout(() => { ring.style.opacity = '1'; ring.classList.add('listen-pulse'); }, i * 200);
                });
                ambientGlow.style.opacity = '0.2';
            } else {
                avatar.style.transform = 'scale(1)';
                avatar.style.boxShadow = '0 0 0 0 rgba(124, 106, 239, 0)';
                audioBars.style.opacity = '0';
                pulseRings.forEach(ring => { ring.style.opacity = '0'; ring.classList.remove('listen-pulse'); });
                ambientGlow.style.opacity = '0.1';
                statusText.textContent = 'Tap to continue';
            }
        }

        function sendQuickAction(text) {
            if (ws?.readyState === WebSocket.OPEN) {
                document.getElementById('statusText').textContent = '';
                showTyping();
                ws.send(JSON.stringify({ type: 'text_message', text }));
            }
        }

        function showTyping() {
            const typing = document.getElementById('typingIndicator');
            const aiResponse = document.getElementById('aiResponse');
            typing.classList.remove('hidden');
            aiResponse.classList.add('hidden');
        }

        function showAIResponse(text) {
            const typing = document.getElementById('typingIndicator');
            const aiResponse = document.getElementById('aiResponse');
            const aiText = document.getElementById('aiResponseText');

            typing.classList.add('hidden');
            aiResponse.classList.remove('hidden');
            aiText.textContent = text;
            aiText.style.opacity = '0';
            aiText.style.transform = 'translateY(10px)';

            requestAnimationFrame(() => {
                aiText.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                aiText.style.opacity = '1';
                aiText.style.transform = 'translateY(0)';
            });

            setTimeout(() => {
                aiText.style.opacity = '0';
                setTimeout(() => { aiResponse.classList.add('hidden'); }, 500);
            }, 6000);
        }

        function playAudio(base64Audio) {
            const audio = new Audio(`data:audio/mpeg;base64,${base64Audio}`);
            audio.play().catch(err => console.error('Audio play error:', err));
        }
    </script>
</body>
</html>
