name: Security Scan

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Run ESLint
        run: npx eslint . --ext .js,.jsx,.ts,.tsx || true
      
      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -r "PRIVATE_KEY\|API_KEY\|password\|secret" --include="*.js" --include="*.html" . | grep -v node_modules | grep -v ".env" | grep -v "process.env"; then
            echo "⚠️ Potential hardcoded secrets found"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"
      
      - name: Verify .env is gitignored
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "❌ .env file is tracked by git!"
            exit 1
          fi
          echo "✅ .env is properly gitignored"
      
      - name: Check for console.log in production
        run: |
          if grep -r "console.log" --include="*.js" . | grep -v node_modules | grep -v "test" | grep -v ".github"; then
            echo "⚠️ console.log statements found (review for sensitive data)"
          fi
      
      - name: Security headers check
        run: |
          echo "Checking security headers..."
          if grep -r "X-Frame-Options\|X-Content-Type-Options\|Content-Security-Policy" --include="*.js" . | grep -v node_modules; then
            echo "✅ Security headers present"
          else
            echo "⚠️ Security headers may be missing"
          fi

  dependency-check:
    name: Dependency Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run npm audit
        run: npm audit --audit-level=high
      
      - name: Check for known vulnerabilities
        run: |
          echo "Checking for known vulnerabilities..."
          npm audit --json > audit-report.json || true
          if grep -q '"high"' audit-report.json || grep -q '"critical"' audit-report.json; then
            echo "❌ High or critical vulnerabilities found"
            cat audit-report.json
            exit 1
          fi
          echo "✅ No high/critical vulnerabilities"

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check file sizes
        run: |
          echo "Checking for oversized files..."
          find . -name "*.js" -not -path "*/node_modules/*" -size +100k -exec ls -lh {} \;
          find . -name "*.html" -not -path "*/node_modules/*" -size +50k -exec ls -lh {} \;
      
      - name: Verify project structure
        run: |
          echo "Verifying project structure..."
          test -f package.json && echo "✅ package.json exists" || echo "❌ package.json missing"
          test -f .gitignore && echo "✅ .gitignore exists" || echo "❌ .gitignore missing"
          test -f README.md && echo "✅ README.md exists" || echo "❌ README.md missing"
          test -d api && echo "✅ api/ directory exists" || echo "❌ api/ directory missing"
